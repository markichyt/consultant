<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ConsultantLM — Live Demo</title>
<meta name="theme-color" content="#0A1118" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0A1118; color: #fff; font-family: 'Outfit', sans-serif; }

  /* ── stage ── */
  .stage {
    position: fixed; inset: 0;
    display: flex;
    will-change: transform;
    transition: transform 480ms cubic-bezier(.22,.61,.36,1);
  }
  .stage.no-anim { transition: none; }
  .slide {
    flex: 0 0 100vw;
    width: 100vw; height: 100vh;
    position: relative;
    background: #0A1118;
  }
  .slide iframe {
    width: 100%; height: 100%;
    border: 0; display: block;
    background: #0A1118;
  }
  .slide.is-empty::before {
    content: ''; position: absolute; inset: 0;
    background: #0A1118 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><circle cx='20' cy='20' r='14' fill='none' stroke='%23254253' stroke-width='2.5' stroke-dasharray='30 60' transform='rotate(-90 20 20)'><animateTransform attributeName='transform' type='rotate' from='0 20 20' to='360 20 20' dur='1.1s' repeatCount='indefinite'/></circle></svg>") center / 40px no-repeat;
  }

  /* ── progress rail (top) ── */
  .rail {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.06);
    z-index: 50; pointer-events: none;
  }
  .rail .fill {
    height: 100%;
    background: linear-gradient(90deg, #1397D6, #56C2F0);
    box-shadow: 0 0 14px rgba(86,194,240,0.7);
    transition: width 480ms cubic-bezier(.22,.61,.36,1);
  }

  /* ── counter (top-right) ── */
  .counter {
    position: fixed; top: 18px; right: 22px;
    z-index: 50; pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.65);
    background: rgba(10,17,24,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 7px 13px; border-radius: 999px;
  }
  .counter b { color: #56C2F0; font-weight: 600; }

  /* ── arrow buttons ── */
  .nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(10,17,24,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.10);
    display: grid; place-items: center;
    cursor: pointer; z-index: 50;
    color: #fff;
    transition: all .2s;
  }
  .nav:hover { background: rgba(19,151,214,0.20); border-color: rgba(86,194,240,0.5); transform: translateY(-50%) scale(1.05); }
  .nav.prev { left: 22px; }
  .nav.next { right: 22px; }
  .nav[disabled] { opacity: 0.25; cursor: default; }
  .nav[disabled]:hover { transform: translateY(-50%) scale(1); background: rgba(10,17,24,0.55); border-color: rgba(255,255,255,0.10); }

  /* ── dots (bottom) ── */
  .dots {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex; gap: 8px;
    background: rgba(10,17,24,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 14px; border-radius: 999px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    border: 0; cursor: pointer; padding: 0;
    transition: all .25s;
  }
  .dot:hover { background: rgba(86,194,240,0.5); }
  .dot.active { background: #56C2F0; width: 22px; border-radius: 4px; box-shadow: 0 0 10px rgba(86,194,240,0.6); }

  /* ── hint (bottom-left) ── */
  .hint {
    position: fixed; bottom: 22px; left: 22px;
    z-index: 50; pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.4);
    background: rgba(10,17,24,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 7px 12px; border-radius: 8px;
  }
  .hint kbd {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.14);
    padding: 1px 6px; border-radius: 4px;
    margin: 0 2px;
    font-family: inherit; font-size: 10px;
    color: rgba(255,255,255,0.7);
  }

  /* ── mobile block screen ── */
  .mobile-block {
    position: fixed; inset: 0;
    background: #0A1118;
    z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 32px 28px;
  }
  .mobile-block .logo-mark {
    width: 64px; height: 64px;
    border-radius: 14px;
    border: 2px solid #1397D6;
    display: grid; place-items: center;
    color: #56C2F0;
    font-family: 'Outfit', sans-serif;
    font-weight: 800; font-size: 32px;
    margin-bottom: 28px;
    box-shadow: 0 0 40px rgba(19,151,214,0.4);
  }
  .mobile-block .brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 800; font-size: 14px;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 36px;
  }
  .mobile-block .brand span { color: #56C2F0; }
  .mobile-block h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 24px;
    line-height: 1.3; color: #fff;
    max-width: 380px;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .mobile-block p {
    font-family: 'Outfit', sans-serif;
    font-size: 15px; line-height: 1.55;
    color: rgba(255,255,255,0.6);
    max-width: 340px;
    margin-bottom: 32px;
  }
  .mobile-block .pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(86,194,240,0.10);
    border: 1px solid rgba(86,194,240,0.32);
    padding: 11px 18px; border-radius: 999px;
    color: #56C2F0; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.14em;
  }
  .mobile-block .pill svg { stroke: #56C2F0; }
  .mobile-block .footer {
    position: absolute; bottom: 24px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  /* ── responsive nav ── */
  @media (max-width: 640px) {
    .nav { width: 42px; height: 42px; }
    .nav.prev { left: 10px; }
    .nav.next { right: 10px; }
    .counter { top: 12px; right: 12px; font-size: 11px; padding: 5px 10px; }
    .dots { bottom: 12px; padding: 8px 12px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<div class="mobile-block" id="mobile-block" style="display: none;">
  <div class="logo-mark">C<span style="color:#1397D6">.</span></div>
  <div class="brand">CONSULTANT<span>·</span>LM</div>
  <h1>Best viewed on a tablet or computer</h1>
  <p>This deck contains interactive video demos that need a larger screen to display correctly.</p>
  <div class="pill">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    Open on tablet or laptop
  </div>
  <div class="footer">© ConsultantLM · 2026 · Confidential</div>
</div>

<div id="desktop-deck" style="display: none;">
  <div class="rail"><div class="fill" id="fill" style="width: 20%"></div></div>
  <div class="counter"><b id="cur">01</b> / <span id="total">05</span></div>

  <button class="nav prev" id="prev" aria-label="Previous slide">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav next" id="next" aria-label="Next slide">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
  </button>

  <div class="dots" id="dots"></div>

  <div class="hint">
    <kbd>←</kbd><kbd>→</kbd> &nbsp;arrows · <kbd>Space</kbd> next · trackpad / swipe
  </div>

  <div class="stage" id="stage"></div>
</div>

<script>
(function () {
  'use strict';

  function isMobile() {
    return window.innerWidth < 700 || window.innerHeight < 500;
  }

  var mobileBlock = document.getElementById('mobile-block');
  var desktopDeck = document.getElementById('desktop-deck');

  var SLIDES = [
    { src: 'slide1.html', title: 'Welcome' },
    { src: 'slide2.html', title: 'Lawyer Cabinet' },
    { src: 'slide3.html', title: 'Internal Sales CRM' },
    { src: 'slide4.html', title: 'AI Content Factory' },
    { src: 'slide5.html', title: 'Mobile Apps' },
  ];
  var N = SLIDES.length;

  var stage = document.getElementById('stage');
  var fill = document.getElementById('fill');
  var curEl = document.getElementById('cur');
  var totalEl = document.getElementById('total');
  var dotsEl = document.getElementById('dots');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');

  totalEl.textContent = String(N).padStart(2, '0');

  var slideEls = [];
  for (var i = 0; i < N; i++) {
    (function (i) {
      var d = document.createElement('div');
      d.className = 'slide is-empty';
      d.setAttribute('data-idx', i);
      stage.appendChild(d);
      slideEls.push(d);

      var b = document.createElement('button');
      b.className = 'dot';
      b.setAttribute('aria-label', 'Slide ' + (i + 1) + ': ' + SLIDES[i].title);
      b.title = (i + 1) + '. ' + SLIDES[i].title;
      b.addEventListener('click', function () { go(i); });
      dotsEl.appendChild(b);
    })(i);
  }
  var dotEls = Array.prototype.slice.call(dotsEl.children);

  var current = 0;
  var loaded = {};

  function getVideos(idx) {
    var slot = slideEls[idx];
    if (!slot) return [];
    var f = slot.querySelector('iframe');
    if (!f) return [];
    try {
      var vids = f.contentDocument && f.contentDocument.querySelectorAll('video');
      return vids ? Array.prototype.slice.call(vids) : [];
    } catch (e) { return []; }
  }

  function pauseAllVideosExcept(idx) {
    Object.keys(loaded).forEach(function (k) {
      var i = parseInt(k, 10);
      if (i === idx) return;
      getVideos(i).forEach(function (v) {
        try { v.pause(); v.currentTime = 0; } catch (e) {}
      });
    });
  }

  function playVideosOn(idx) {
    getVideos(idx).forEach(function (v) {
      try {
        v.muted = true;
        var p = v.play();
        if (p && p.catch) p.catch(function () { /* autoplay blocked — controls still work */ });
      } catch (e) {}
    });
  }

  function mountIframe(idx) {
    if (loaded[idx]) return;
    var slot = slideEls[idx];
    var f = document.createElement('iframe');
    f.setAttribute('loading', 'eager');
    f.setAttribute('allow', 'autoplay; fullscreen');
    f.src = SLIDES[idx].src;
    f.addEventListener('load', function () {
      slot.classList.remove('is-empty');
      try {
        var cw = f.contentWindow;
        cw.addEventListener('wheel', handleWheel, { passive: true });
        cw.addEventListener('keydown', handleKeydown);
        cw.addEventListener('touchstart', handleTouchStart, { passive: true });
        cw.addEventListener('touchend', handleTouchEnd, { passive: true });
      } catch (e) {}
      // If a neighbor mounted late, pause its videos; only current plays.
      if (idx !== current) {
        getVideos(idx).forEach(function (v) {
          try { v.pause(); v.currentTime = 0; } catch (e) {}
        });
      } else {
        playVideosOn(idx);
      }
    });
    slot.appendChild(f);
    loaded[idx] = true;
  }

  function ensureNeighbors() {
    mountIframe(current);
    if (current > 0) mountIframe(current - 1);
    if (current < N - 1) mountIframe(current + 1);
  }

  function applyTransform(animated) {
    if (animated === false) stage.classList.add('no-anim');
    stage.style.transform = 'translateX(' + (-current * 100) + 'vw)';
    if (animated === false) {
      void stage.offsetWidth;
      stage.classList.remove('no-anim');
    }
  }

  function updateUI() {
    var pct = ((current + 1) / N) * 100;
    fill.style.width = pct + '%';
    curEl.textContent = String(current + 1).padStart(2, '0');
    dotEls.forEach(function (d, i) { d.classList.toggle('active', i === current); });
    prevBtn.disabled = (current === 0);
    nextBtn.disabled = (current === N - 1);

    if (history.replaceState) {
      history.replaceState(null, '', '#' + (current + 1));
    }
    document.title = String(current + 1).padStart(2, '0') + ' · ' + SLIDES[current].title + ' — ConsultantLM Demo';
  }

  function go(idx, opts) {
    opts = opts || {};
    if (idx < 0) idx = 0;
    if (idx >= N) idx = N - 1;
    if (idx === current && !opts.force) return;
    current = idx;
    ensureNeighbors();
    applyTransform(opts.animated !== false);
    updateUI();
    pauseAllVideosExcept(current);
    playVideosOn(current);
  }

  function next() { go(current + 1); }
  function prev() { go(current - 1); }

  // ── Trackpad / mouse wheel — horizontal swipe ──
  var wheelAccum = 0;
  var wheelLock = false;
  var wheelResetTimer = null;
  var WHEEL_THRESHOLD = 60;
  var WHEEL_COOLDOWN = 650;

  function handleWheel(e) {
    if (wheelLock) return;
    var dx = e.deltaX || 0;
    var dy = e.deltaY || 0;
    if (Math.abs(dx) < 8) return;
    if (Math.abs(dx) < Math.abs(dy) * 0.85) return;

    wheelAccum += dx;
    clearTimeout(wheelResetTimer);
    wheelResetTimer = setTimeout(function () { wheelAccum = 0; }, 220);

    if (Math.abs(wheelAccum) > WHEEL_THRESHOLD) {
      if (wheelAccum > 0) next(); else prev();
      wheelAccum = 0;
      wheelLock = true;
      setTimeout(function () { wheelLock = false; }, WHEEL_COOLDOWN);
    }
  }
  window.addEventListener('wheel', handleWheel, { passive: true });

  function handleKeydown(e) {
    var tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight':
      case 'PageDown':
        e.preventDefault(); next(); break;
      case 'ArrowLeft':
      case 'PageUp':
        e.preventDefault(); prev(); break;
      case ' ':
        e.preventDefault();
        e.shiftKey ? prev() : next();
        break;
      case 'Home':
        e.preventDefault(); go(0); break;
      case 'End':
        e.preventDefault(); go(N - 1); break;
    }
  }
  document.addEventListener('keydown', handleKeydown);

  var touch = null;
  function handleTouchStart(e) {
    if (e.touches.length !== 1) return;
    touch = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
  }
  function handleTouchEnd(e) {
    if (!touch) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touch.x;
    var dy = t.clientY - touch.y;
    var dt = Date.now() - touch.t;
    touch = null;
    if (dt < 600 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) next(); else prev();
    }
  }
  document.addEventListener('touchstart', handleTouchStart, { passive: true });
  document.addEventListener('touchend', handleTouchEnd, { passive: true });

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);

  function hashIdx() {
    var m = (location.hash || '').match(/#?(\d+)/);
    if (!m) return 0;
    var n = parseInt(m[1], 10) - 1;
    if (isNaN(n) || n < 0) n = 0;
    if (n >= N) n = N - 1;
    return n;
  }

  // ── Mode switching (mobile ⇄ desktop), no reload ──
  var deckInitialized = false;

  function applyMode() {
    var mobile = isMobile();
    mobileBlock.style.display = mobile ? 'flex' : 'none';
    desktopDeck.style.display = mobile ? 'none' : 'block';

    if (mobile) return;

    if (!deckInitialized) {
      current = hashIdx();
      ensureNeighbors();
      applyTransform(false);
      updateUI();
      deckInitialized = true;
    } else {
      applyTransform(false);
    }
  }

  applyMode();

  window.addEventListener('hashchange', function () {
    if (isMobile()) return;
    var idx = hashIdx();
    if (idx !== current) go(idx);
  });

  var resizeTimer = null;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(applyMode, 100);
  });

  window.deck = { go: go, next: next, prev: prev, current: function () { return current; } };
})();
</script>

</body>
</html>
